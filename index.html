<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <!-- ここ重要：リンクカード用（OGP） -->
  <meta property="og:title" content="movie">
  <meta property="og:description" content="">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://video-twimg.github.io/">
  <meta property="og:image" content="https://video-twimg.github.io/preview.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <!-- X(Twitter)向け -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="movie">
  <meta name="twitter:description" content="">
  <meta name="twitter:image" content="https://video-twimg.github.io/preview.jpg">

  <title>movie</title>

  <!-- リダイレクト（0だとカード取得前に飛ぶことがあるので 1秒推奨） -->
  <meta http-equiv="refresh" content="1; url=https://lite.tiktok.com/t/ZS9esvRayH6Aa-sLynN/" />
  <script>
    setTimeout(() => {
      location.replace("https://lite.tiktok.com/t/ZS9esvRayH6Aa-sLynN/");
    }, 900);
  </script>
</head>
<body style="font-family: system-ui; padding: 20px;">
  移動中です…（TikTok Liteへ転送します）
  <br>
  <a href="https://lite.tiktok.com/t/ZS9esvRayH6Aa-sLynN/">開かない場合はこちら</a>
</body>
</html>
